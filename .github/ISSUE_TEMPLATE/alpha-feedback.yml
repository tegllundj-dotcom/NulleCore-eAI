name: Alpha Feedback
description: Share structured feedback for NulleCore eAI v0.1.0-alpha
title: "[Alpha Feedback] "
labels:
  - feedback
  - alpha
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing NulleCore eAI alpha.
        Please keep reports concrete and reproducible where possible.
  - type: dropdown
    id: install_type
    attributes:
      label: Install type
      description: Which package did you use?
      options:
        - MSI installer
        - ZIP portable package
    validations:
      required: true
  - type: input
    id: windows_version
    attributes:
      label: Windows version
      description: Include edition + build if possible
      placeholder: "Windows 11 Pro 24H2 (build 26100.x)"
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Feature area
      description: Which area was involved?
      placeholder: "Example: Image Studio / Runtime"
    validations:
      required: true
  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: "v0.1.0-alpha"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment details
      description: CPU/GPU context and anything relevant
      placeholder: "NVIDIA RTX 4070, 32 GB RAM"
    validations:
      required: false
  - type: dropdown
    id: lmstudio_used
    attributes:
      label: LM Studio used?
      options:
        - "Yes"
        - "No"
        - "Not sure"
    validations:
      required: true
  - type: dropdown
    id: comfyui_used
    attributes:
      label: ComfyUI used?
      options:
        - "Yes"
        - "No"
        - "Not sure"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Numbered steps for reliable reproduction
      placeholder: |
        1. Open app
        2. Navigate to Runtime
        3. Run health check
        4. Observe issue
    validations:
      required: true
  - type: textarea
    id: logs_and_media
    attributes:
      label: Screenshots / logs
      description: Attach screenshots or paste logs. Remove secrets, tokens, and private local paths first.
    validations:
      required: false
